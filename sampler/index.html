<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sampler</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="start-overlay">
        <div class="overlay-inner">
            <div class="overlay-label">acoustic grand piano</div>
            <h1 class="overlay-title">SAMPLER</h1>
            <p class="overlay-sub">touch-optimised · polyphonic · soundfont</p>
            <button id="start-btn">
                <span class="btn-ring"></span>
                START
            </button>
            <p class="overlay-status" id="load-status"></p>
        </div>
    </div>

    <div id="app">
        <header id="app-header">
            <a href="../" class="back-link">← back</a>
            <span class="app-title">SAMPLER</span>
            <span class="range-label" id="range-label"></span>
        </header>

        <main id="app-main">
            <div class="stage">
                <div class="stage-glow"></div>

                <div class="nudge-row">
                    <div class="nudge-group">
                        <button class="nudge-btn" id="oct-down">−8va</button>
                        <button class="nudge-btn" id="semi-down">−♩</button>
                    </div>
                    <div class="nudge-group">
                        <button class="nudge-btn" id="semi-up">+♩</button>
                        <button class="nudge-btn" id="oct-up">+8va</button>
                    </div>
                </div>

                <div id="container">
                    <canvas id="piano"></canvas>
                </div>

                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span class="live-text">LIVE</span>
                </div>
            </div>
        </main>
    </div>

    <!-- soundfont-player: exposes window.Soundfont -->
    <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
