<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playable</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="app" class="visible">

    <header id="app-header">
        <a href="../" class="back-link">← back</a>
        <span class="app-title">PLAYABLE</span>
        <span class="range-label" id="range-label"></span>
    </header>

    <main id="app-main">
        <div class="stage">
            <div class="stage-glow"></div>

            <div class="nudge-row">
                <div class="nudge-group">
                    <button class="nudge-btn" id="oct-down">−8va</button>
                    <button class="nudge-btn" id="semi-down">−♩</button>
                </div>
                <div class="nudge-group">
                    <button class="nudge-btn" id="semi-up">+♩</button>
                    <button class="nudge-btn" id="oct-up">+8va</button>
                </div>
            </div>

            <div id="container">
                <canvas id="piano"></canvas>
            </div>

            <div class="live-indicator">
                <span class="live-dot"></span>
                <span class="live-text">LIVE</span>
            </div>
        </div>
    </main>

</div>

<script type="module" src="./playable.js"></script>
</body>
</html>
