<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scales</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* scales-specific layout — no overflow:hidden, page can scroll */
        html, body { overflow: auto; }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .control-group select {
            background: var(--bg-raised);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 6px 10px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .control-group select:focus {
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<div id="app" class="visible">

    <header id="app-header">
        <a href="../" class="back-link">← back</a>
        <span class="app-title">SCALES</span>
        <span class="range-label" id="range-label"></span>
    </header>

    <main id="app-main">
        <div class="stage">
            <div class="stage-glow"></div>

            <div class="nudge-row" style="flex-direction: column; gap: 12px; align-items: stretch;">

                <div class="controls-row">
                    <div class="control-group">
                        <label for="root">Root</label>
                        <select id="root"></select>
                    </div>
                    <div class="control-group">
                        <label for="scale">Scale</label>
                        <select id="scale"></select>
                    </div>
                </div>

                <div style="display:flex; justify-content:space-between;">
                    <div class="nudge-group">
                        <button class="nudge-btn" id="shift-oct-down">−8va</button>
                        <button class="nudge-btn" id="shift-semi-down">−♩</button>
                    </div>
                    <div class="nudge-group">
                        <button class="nudge-btn" id="shift-semi-up">+♩</button>
                        <button class="nudge-btn" id="shift-oct-up">+8va</button>
                    </div>
                </div>

            </div>

            <div id="container">
                <canvas id="piano"></canvas>
            </div>

            <div class="live-indicator">
                <span class="live-dot"></span>
                <span class="live-text">LIVE</span>
            </div>
        </div>
    </main>

</div>

<script type="module" src="./scales.js"></script>
</body>
</html>
